services:
  - type: web
    name: quiz-app
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: REFRESH_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: quiz-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://quiz-app.onrender.com
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: SMTP_HOST
        value: ""  # LEGACY (não utilizado — modo demo)
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: ""  # LEGACY
      - key: SMTP_PASSWORD
        value: ""  # LEGACY
      - key: SMTP_FROM
        value: "noreply@quizapp.com"
      - key: SMTP_USE_TLS
        value: "true"
      - key: FRONTEND_URL
        value: "https://quiz-app.onrender.com"

databases:
  - name: quiz-db
    plan: free
    databaseName: quizdb
    postgresMajorVersion: 16
