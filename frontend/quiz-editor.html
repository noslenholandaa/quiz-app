<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Quiz — Quiz App</title>
    <link rel="stylesheet" href="style.css?v=20260619">
</head>
<body>
    <div class="app-layout">
        <div class="main-area">
            <div class="content content-narrow">
        <div id="qe-loading" style="text-align:center;padding:48px">
            <div class="skeleton" style="height:40px;margin-bottom:16px;border-radius:10px"></div>
            <div class="skeleton" style="height:200px;border-radius:10px"></div>
        </div>
        <div id="qe-error" class="hidden" role="alert"></div>

        <div id="qe-form" class="hidden">
            <form id="quiz-form" onsubmit="saveQuiz(event)">
                <div class="qe-section">
                    <div class="form-group">
                        <label class="form-label" for="quiz-title">Título do Quiz</label>
                        <input type="text" id="quiz-title" class="input" placeholder="Ex: Matemática Básica" required maxlength="200">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="quiz-category">Categoria</label>
                            <select id="quiz-category" class="input"></select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="quiz-difficulty">Dificuldade</label>
                            <select id="quiz-difficulty" class="input">
                                <option value="easy">Fácil</option>
                                <option value="medium" selected>Médio</option>
                                <option value="hard">Difícil</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="quiz-description">Descrição (opcional)</label>
                        <textarea id="quiz-description" class="input" rows="3" placeholder="Descreva seu quiz..." maxlength="1000"></textarea>
                    </div>
                </div>

                <div class="flex" style="gap:12px;align-items:center;margin:16px 0 20px">
                    <h3 style="margin:0">Questões</h3>
                    <span id="question-counter" class="badge badge-secondary">0</span>
                    <button type="button" class="btn btn-primary btn-sm" onclick="addQuestion()" style="margin-left:auto">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Adicionar questão
                    </button>
                </div>

                <div id="questions-container"></div>

                <div class="flex" style="gap:12px;margin-top:24px">
                    <button type="submit" class="btn btn-primary" id="btn-save">Salvar Quiz</button>
                    <button type="button" class="btn btn-secondary" onclick="history.back()">Cancelar</button>
                </div>
            </form>
        </div>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <div class="sidebar-overlay" onclick="toggleMobileMenu()"></div>
    <script src="theme.js?v=20260619"></script>
    <script src="toast.js?v=20260619"></script>
    <script src="auth.js?v=20260619"></script>
    <script>
        let editingId = null;
        let questionIndex = 0;
        let removingIds = [];
        let categoriesCache = [];

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        async function loadCategories() {
            try {
                const data = await apiGet('/categories');
                categoriesCache = data || [];
                const sel = document.getElementById('quiz-category');
                sel.innerHTML = '<option value="">Selecione...</option>' +
                    categoriesCache.map(c => `<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)}</option>`).join('');
            } catch (_) {}
        }

        function renderQuestions(questions) {
            const container = document.getElementById('questions-container');
            if (!questions || questions.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">❓</div><h3>Nenhuma questão</h3><p>Clique em "Adicionar questão" para começar.</p></div>';
                document.getElementById('question-counter').textContent = '0';
                return;
            }
            document.getElementById('question-counter').textContent = questions.length;
            container.innerHTML = questions.map((q, idx) => {
                const i = idx;
                const options = q.options && q.options.length > 0 ? q.options : ['', '', '', ''];
                const correctIdx = q.correct_index !== undefined ? q.correct_index : 0;
                return `<div class="question-block" data-index="${i}">
                    <div class="qe-question-header">
                        <span class="qe-question-number">Questão ${i + 1}</span>
                        <button type="button" class="btn btn-danger btn-xs" onclick="removeQuestion(${i})">Remover</button>
                    </div>
                    <div class="form-group">
                        <input type="text" class="input" placeholder="Digite a pergunta..." value="${escapeHtml(q.question || '')}" data-field="question" data-idx="${i}">
                    </div>
                    <div class="qe-options">
                        ${options.map((opt, oi) => `
                            <div class="qe-option">
                                <input type="radio" name="correct_${i}" value="${oi}" ${oi === correctIdx ? 'checked' : ''} class="qe-radio">
                                <input type="text" class="input" placeholder="Opção ${oi + 1}..." value="${escapeHtml(opt)}" data-field="option" data-idx="${i}" data-opt="${oi}">
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        function collectQuestions() {
            const blocks = document.querySelectorAll('.question-block');
            return Array.from(blocks).map(block => {
                const i = parseInt(block.dataset.index);
                const question = block.querySelector('input[data-field="question"]').value.trim();
                const options = block.querySelectorAll('input[data-field="option"]');
                const opts = Array.from(options).map(o => o.value.trim());
                const correctRadio = block.querySelector('input[type="radio"]:checked');
                const correctIndex = correctRadio ? parseInt(correctRadio.value) : 0;
                return { question, options: opts, correct_index: correctIndex };
            }).filter(q => q.question && q.options.length >= 2);
        }

        function addQuestion() {
            const container = document.getElementById('questions-container');
            const blocks = container.querySelectorAll('.question-block');
            const count = blocks.length;
            const div = document.createElement('div');
            div.className = 'question-block';
            div.dataset.index = count;
            div.innerHTML = `
                <div class="qe-question-header">
                    <span class="qe-question-number">Questão ${count + 1}</span>
                    <button type="button" class="btn btn-danger btn-xs" onclick="removeQuestion(${count})">Remover</button>
                </div>
                <div class="form-group">
                    <input type="text" class="input" placeholder="Digite a pergunta..." data-field="question" data-idx="${count}">
                </div>
                <div class="qe-options">
                    ${[0,1,2,3].map(oi => `
                        <div class="qe-option">
                            <input type="radio" name="correct_${count}" value="${oi}" ${oi === 0 ? 'checked' : ''} class="qe-radio">
                            <input type="text" class="input" placeholder="Opção ${oi + 1}..." data-field="option" data-idx="${count}" data-opt="${oi}">
                        </div>
                    `).join('')}
                </div>
            `;
            if (count === 0) container.innerHTML = '';
            container.appendChild(div);
            document.getElementById('question-counter').textContent = count + 1;
            div.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function removeQuestion(idx) {
            const blocks = document.querySelectorAll('.question-block');
            if (blocks.length <= 1) {
                Toast.warning('O quiz precisa de pelo menos uma questão.');
                return;
            }
            if (!confirm('Remover esta questão?')) return;
            const block = blocks[idx];
            block.style.animation = 'fadeOutUp 0.3s ease forwards';
            setTimeout(() => {
                block.remove();
                const remaining = document.querySelectorAll('.question-block');
                remaining.forEach((b, i) => {
                    b.dataset.index = i;
                    b.querySelector('.qe-question-number').textContent = `Questão ${i + 1}`;
                    b.querySelectorAll('input[type="radio"]').forEach(r => r.name = `correct_${i}`);
                    b.querySelectorAll('input[data-field="question"]').forEach(inp => inp.dataset.idx = i);
                    b.querySelectorAll('input[data-field="option"]').forEach(inp => inp.dataset.idx = i);
                });
                document.getElementById('question-counter').textContent = remaining.length;
                if (remaining.length === 0) {
                    document.getElementById('questions-container').innerHTML = '<div class="empty-state"><div class="empty-state-icon">❓</div><h3>Nenhuma questão</h3><p>Clique em "Adicionar questão" para começar.</p></div>';
                }
            }, 300);
        }

        async function saveQuiz(e) {
            e.preventDefault();
            const title = document.getElementById('quiz-title').value.trim();
            if (!title) { Toast.warning('Informe o título do quiz.'); return; }

            const questions = collectQuestions();
            if (questions.length < 1) { Toast.warning('Adicione pelo menos uma questão.'); return; }

            const payload = {
                title,
                category: document.getElementById('quiz-category').value || null,
                difficulty: document.getElementById('quiz-difficulty').value,
                description: document.getElementById('quiz-description').value.trim() || null,
                questions
            };

            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.textContent = 'Salvando...';

            try {
                if (editingId) {
                    await apiPut(`/quizzes/${editingId}`, payload);
                    Toast.success('Quiz atualizado com sucesso!');
                } else {
                    await apiPost('/quizzes', payload);
                    Toast.success('Quiz criado com sucesso!');
                }
                setTimeout(() => { window.location.href = '/manage'; }, 800);
            } catch (err) {
                btn.disabled = false;
                btn.textContent = editingId ? 'Salvar Quiz' : 'Salvar Quiz';
                Toast.error(handleApiError(err));
            }
        }

        async function loadEditor() {
            const user = await getCurrentUser();
            if (!user || user.role !== 'admin') {
                document.getElementById('qe-loading').classList.add('hidden');
                document.getElementById('qe-error').innerHTML = `<div class="alert alert-danger"><span class="alert-message">Acesso restrito a administradores.</span></div>`;
                return;
            }
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            await loadCategories();

            if (id) {
                editingId = parseInt(id);
                try {
                    const data = await apiGet(`/quizzes/${editingId}`);
                    document.getElementById('quiz-title').value = data.title;
                    document.getElementById('quiz-category').value = data.category || '';
                    document.getElementById('quiz-difficulty').value = data.difficulty || 'medium';
                    document.getElementById('quiz-description').value = data.description || '';
                    renderQuestions(data.questions || []);
                    document.getElementById('qe-loading').classList.add('hidden');
                    document.getElementById('qe-form').classList.remove('hidden');
                } catch (err) {
                    document.getElementById('qe-loading').classList.add('hidden');
                    document.getElementById('qe-error').innerHTML = `<div class="alert alert-danger"><span class="alert-message">${handleApiError(err)}</span></div>`;
                }
            } else {
                document.getElementById('qe-loading').classList.add('hidden');
                document.getElementById('qe-form').classList.remove('hidden');
                addQuestion();
            }
        }

        redirectIfNotAuth();
        if (typeof initLayout === 'function') initLayout('Editor');
        loadEditor();
    </script>
</body>
</html>
