<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha — Quiz App</title>
    <link rel="stylesheet" href="style.css?v=20260619">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">QA</div>
            <h1>Quiz App</h1>
            <p>Redefina sua senha</p>
        </div>
        <div class="auth-card">
            <h2>Nova Senha</h2>
            <div id="reset-error" class="auth-msg auth-error hidden" role="alert"></div>
            <div id="reset-success" class="auth-msg auth-success hidden" role="alert"></div>
            <form id="reset-form" onsubmit="handleReset(event)">
                <div class="form-group">
                    <label class="form-label" for="new-password">Nova senha</label>
                    <input type="password" id="new-password" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6" autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirmar senha</label>
                    <input type="password" id="confirm-password" class="form-input" placeholder="Repita a senha" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg" id="reset-btn">Redefinir</button>
            </form>
            <div class="auth-footer">
                <a href="/static/login.html">Fazer login</a>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="theme.js?v=20260619"></script>
    <script src="toast.js?v=20260619"></script>
    <script src="auth.js?v=20260619"></script>
    <script>
        function getResetToken() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }
        async function handleReset(event) {
            event.preventDefault();
            const token = getResetToken();
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const errorEl = document.getElementById('reset-error');
            const successEl = document.getElementById('reset-success');
            const btn = document.getElementById('reset-btn');
            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');
            if (!token) {
                errorEl.textContent = 'Token de recuperação não encontrado na URL.';
                errorEl.classList.remove('hidden'); return;
            }
            if (!password || !confirm) {
                errorEl.textContent = 'Preencha todos os campos.';
                errorEl.classList.remove('hidden'); return;
            }
            if (password !== confirm) {
                errorEl.textContent = 'As senhas não conferem.';
                errorEl.classList.remove('hidden'); return;
            }
            btn.disabled = true;
            btn.textContent = 'Redefinindo...';
            try {
                const res = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: password }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Erro ao redefinir senha');
                successEl.textContent = 'Senha redefinida com sucesso! Redirecionando...';
                successEl.classList.remove('hidden');
                setTimeout(() => { window.location.href = '/static/login.html'; }, 2000);
            } catch (err) {
                errorEl.textContent = handleApiError(err);
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Redefinir';
                Toast.error(handleApiError(err));
            }
        }
    </script>
</body>
</html>
