<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha — Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div>
                    <h1>Quiz App</h1>
                    <p>Redefina sua senha</p>
                </div>
                <div class="user-area">
                    <button id="theme-toggle" class="theme-btn" onclick="Theme.toggle()" aria-label="Alternar tema" title="Alternar tema"></button>
                </div>
            </div>
        </header>
        <main>

        <div class="auth-card">
            <h2>Nova Senha</h2>

            <div id="reset-error" class="auth-msg auth-error hidden" role="alert"></div>
            <div id="reset-success" class="auth-msg auth-success hidden" role="alert"></div>

            <form id="reset-form" onsubmit="handleReset(event)">
                <div class="auth-field">
                    <label for="new-password">Nova senha <span class="required-star">*</span></label>
                    <input type="password" id="new-password" class="auth-input" placeholder="Mínimo 6 caracteres" required minlength="6" autofocus>
                </div>

                <div class="auth-field">
                    <label for="confirm-password">Confirmar senha <span class="required-star">*</span></label>
                    <input type="password" id="confirm-password" class="auth-input" placeholder="Repita a senha" required minlength="6">
                </div>

                <button type="submit" class="submit-btn" id="reset-btn">Redefinir</button>
            </form>

            <p class="auth-link">
                <a href="/static/login.html">Fazer login</a>
            </p>
        </div>
    </main>
    </div>

    <script src="theme.js"></script>
    <script src="toast.js"></script>
    <script src="auth.js"></script>
    <script>
        function getResetToken() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        async function handleReset(event) {
            event.preventDefault();

            const token = getResetToken();
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const errorEl = document.getElementById('reset-error');
            const successEl = document.getElementById('reset-success');
            const btn = document.getElementById('reset-btn');

            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');

            if (!token) {
                errorEl.textContent = 'Token de recuperação não encontrado na URL.';
                errorEl.classList.remove('hidden');
                return;
            }

            if (!password || !confirm) {
                errorEl.textContent = 'Preencha todos os campos.';
                errorEl.classList.remove('hidden');
                return;
            }

            if (password !== confirm) {
                errorEl.textContent = 'As senhas não conferem.';
                errorEl.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Redefinindo...';

            try {
                const res = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: password }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Erro ao redefinir senha');
                successEl.textContent = 'Senha redefinida com sucesso! Redirecionando...';
                successEl.classList.remove('hidden');
                setTimeout(() => { window.location.href = '/static/login.html'; }, 2000);
            } catch (err) {
                errorEl.textContent = handleApiError(err);
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Redefinir';
                Toast.error(handleApiError(err));
            }
        }
    </script>
</body>
</html>
