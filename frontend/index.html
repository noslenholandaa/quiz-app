<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar — Quiz App</title>
    <link rel="stylesheet" href="style.css?v=20260620">
</head>
<body>
    <div class="app-layout">
        <div class="main-area">
            <div class="content content-wide">
        <div id="quiz-list-section">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
                <div class="search-bar" style="flex:1;max-width:100%">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" id="search-input" placeholder="Buscar quizzes..." oninput="filterQuizzes(this.value)">
                </div>
            </div>
            <div id="quiz-list" class="quiz-grid">
                <div class="loading" style="color:var(--text-muted)"><div class="skeleton" style="height:100px;margin-bottom:8px;border-radius:12px"></div><div class="skeleton" style="height:100px;margin-bottom:8px;border-radius:12px"></div><div class="skeleton" style="height:100px;border-radius:12px"></div></div>
            </div>
        </div>

        <div id="form-container" class="hidden">
            <button class="btn btn-ghost" onclick="backToList()" style="margin-bottom:16px">&larr; Voltar</button>
            <div class="progress-text"><span><strong id="form-title-progress"></strong></span><span id="progress-label">0%</span></div>
            <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
            <div class="card" style="padding:0;border:none;box-shadow:none;background:transparent">
                <h2 id="form-title" class="card-title" style="font-size:1.25rem;margin-bottom:4px"></h2>
                <p id="form-desc" class="text-muted text-sm" style="margin-bottom:20px"></p>
                <form id="quiz-form" onsubmit="submitForm(event)">
                    <div id="quiz-questions"></div>
                    <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">Enviar respostas</button>
                </form>
            </div>
        </div>

        <div id="result-container" class="hidden">
            <button class="btn btn-ghost" onclick="backToList()" style="margin-bottom:16px">&larr; Voltar</button>
            <div id="result-card" class="h-card">
                <div class="h-card-header">
                    <div class="h-card-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                        <span id="result-title"></span>
                    </div>
                    <span id="result-badge" class="badge"></span>
                </div>
                <div id="result-summary" class="h-card-summary"></div>
                <div id="result-answers" class="h-card-answers"></div>
                <div class="h-card-footer">
                    <span id="result-date" class="h-card-date"></span>
                </div>
            </div>
        </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <div class="sidebar-overlay" onclick="toggleMobileMenu()"></div>
    <script src="theme.js?v=20260620"></script>
    <script src="toast.js?v=20260620"></script>
    <script src="auth.js?v=20260620"></script>
    <script src="script.js?v=20260620"></script>
</body>
</html>
