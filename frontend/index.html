<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div>
                    <h1>Quiz App</h1>
                    <p>Escolha um formulário para preencher</p>
                </div>
                <div id="user-area" class="user-area hidden">
                    <span id="user-name" class="user-name"></span>
                    <button id="theme-toggle" class="theme-btn" onclick="Theme.toggle()" aria-label="Alternar tema" title="Alternar tema"></button>
                    <a href="/static/dashboard.html" class="history-link">Dashboard</a>
                    <a href="/static/leaderboard.html" class="history-link">Ranking</a>
                    <a href="/static/manage.html" class="history-link" id="manage-link">Gerenciar</a>
                    <a href="/static/history.html" class="history-link">Histórico</a>
                    <button class="logout-btn" onclick="logout()">Sair</button>
                </div>
            </div>
        </header>
        <main>

        <div id="quiz-list-section">
            <div id="quiz-list" class="quiz-list">
                <div class="loading"><div class="spinner"></div>Carregando...</div>
            </div>
        </div>

        <div id="form-container" class="form-container">
            <button class="back-btn" onclick="backToList()">&larr; Voltar</button>
            <div class="form-header">
                <h2 id="form-title"></h2>
                <p id="form-desc"></p>
            </div>
            <form id="quiz-form" onsubmit="submitForm(event)">
                <div id="quiz-questions"></div>
                <button type="submit" class="submit-btn">Enviar respostas</button>
            </form>
        </div>

        <div id="result-container" class="result-container">
            <button class="back-btn" onclick="backToList()">&larr; Voltar</button>
            <div class="result-header">
                <h2 id="result-title"></h2>
                <div class="submission-id" id="submission-id"></div>
            </div>
            <div id="result-answers"></div>
        </div>
    </main>
    </div>

    <script src="theme.js"></script>
    <script src="toast.js"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
