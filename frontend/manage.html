<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar — Quiz App</title>
    <link rel="stylesheet" href="style.css?v=20260619">
</head>
<body>
    <div class="app-layout">
        <div class="main-area">
            <div class="content content-narrow">
        <div class="manage-header">
            <h2>Meus Quizzes</h2>
            <button class="btn btn-primary" id="btn-new-quiz" onclick="location.href='/quiz-editor'" style="display:none">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Novo Quiz
            </button>
        </div>

        <div id="manage-loading" style="text-align:center;padding:32px">
            <div class="skeleton" style="height:40px;margin-bottom:8px;border-radius:10px"></div>
            <div class="skeleton" style="height:40px;margin-bottom:8px;border-radius:10px"></div>
            <div class="skeleton" style="height:40px;border-radius:10px"></div>
        </div>
        <div id="manage-error" class="hidden" role="alert"></div>

        <div id="manage-empty" class="hidden">
            <div class="empty-state">
                <div class="empty-state-icon">📝</div>
                <h3>Nenhum quiz criado</h3>
                <p>Crie seu primeiro quiz e compartilhe com a comunidade.</p>
                <a href="/quiz-editor" class="btn btn-primary" style="margin-top:8px">Criar quiz</a>
            </div>
        </div>

        <div id="manage-table" class="hidden">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th class="hide-mobile">Categoria</th>
                            <th class="hide-tablet">Questões</th>
                            <th class="hide-mobile">Visualizações</th>
                            <th class="hide-tablet">Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="manage-list"></tbody>
                </table>
            </div>
            <div id="manage-pagination" class="grid-pagination"></div>
        </div>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <div class="sidebar-overlay" onclick="toggleMobileMenu()"></div>
    <script src="theme.js?v=20260619"></script>
    <script src="toast.js?v=20260619"></script>
    <script src="auth.js?v=20260619"></script>
    <script>
        let currentPage = 1;
        const PAGE_SIZE = 15;

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function renderManageQuizzes(quizzes) {
            const el = document.getElementById('manage-list');
            if (!quizzes || quizzes.length === 0) {
                document.getElementById('manage-table').classList.add('hidden');
                document.getElementById('manage-empty').classList.remove('hidden');
                return;
            }
            document.getElementById('manage-empty').classList.add('hidden');
            el.innerHTML = quizzes.map(q => {
                const status = q.is_active ? 'Ativo' : 'Inativo';
                const statusClass = q.is_active ? 'badge badge-success' : 'badge badge-secondary';
                const qCount = q.questions ? q.questions.length : (q.question_count || 0);
                return `<tr>
                    <td><a href="/quiz/${q.id}" class="table-link">${escapeHtml(q.title)}</a></td>
                    <td class="hide-mobile">${escapeHtml(q.category || '—')}</td>
                    <td class="hide-tablet">${qCount}</td>
                    <td class="hide-mobile">${q.views || 0}</td>
                    <td class="hide-tablet"><span class="${statusClass}">${status}</span></td>
                    <td class="actions-cell">
                        <a href="/quiz-editor?id=${q.id}" class="btn btn-secondary btn-xs" title="Editar">Editar</a>
                        <button class="btn btn-danger btn-xs" onclick="deleteQuiz(${q.id})" title="Excluir">Excluir</button>
                    </td>
                </tr>`;
            }).join('');
        }

        async function deleteQuiz(id) {
            if (!confirm('Tem certeza que deseja excluir este quiz?')) return;
            try {
                await apiDelete(`/quizzes/${id}`);
                Toast.success('Quiz excluído com sucesso!');
                loadManage();
            } catch (err) {
                Toast.error(handleApiError(err));
            }
        }

        async function loadManage() {
            try {
                const user = await getCurrentUser();
                if (!user) return;
                const isAdmin = user.role === 'admin';
                const btn = document.getElementById('btn-new-quiz');
                if (btn) btn.style.display = isAdmin ? '' : 'none';
                if (!isAdmin) {
                    document.getElementById('manage-loading').classList.add('hidden');
                    document.getElementById('manage-empty').querySelector('h3').textContent = 'Acesso restrito';
                    document.getElementById('manage-empty').querySelector('p').textContent = 'Apenas administradores podem criar e gerenciar quizzes.';
                    document.getElementById('manage-empty').querySelector('a').style.display = 'none';
                    document.getElementById('manage-empty').classList.remove('hidden');
                    return;
                }
                const quizzes = await apiGet('/me/quizzes');
                renderManageQuizzes(quizzes);
                document.getElementById('manage-loading').classList.add('hidden');
                if (quizzes && quizzes.length > 0) {
                    document.getElementById('manage-table').classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('manage-loading').classList.add('hidden');
                document.getElementById('manage-error').innerHTML = `<div class="alert alert-danger"><span class="alert-message">${handleApiError(err)}</span></div>`;
            }
        }

        redirectIfNotAuth();
        if (typeof initLayout === 'function') initLayout('Gerenciar');
        loadManage();
    </script>
</body>
</html>
