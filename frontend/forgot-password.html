<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha — Quiz App</title>
    <link rel="stylesheet" href="style.css?v=20260619">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">QA</div>
            <h1>Quiz App</h1>
            <p>Recupere sua senha</p>
        </div>
        <div class="auth-card">
            <h2>Recuperar Senha</h2>
            <div id="forgot-error" class="auth-msg auth-error hidden" role="alert"></div>
            <div id="forgot-success" class="auth-msg auth-success hidden" role="alert"></div>
            <form id="forgot-form" onsubmit="handleForgot(event)">
                <div class="form-group">
                    <label class="form-label" for="email">E-mail</label>
                    <input type="email" id="email" class="form-input" placeholder="seu@email.com" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg" id="forgot-btn">Enviar</button>
            </form>
            <div class="auth-footer">
                Lembrou sua senha? <a href="/static/login.html">Fazer login</a>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="theme.js?v=20260619"></script>
    <script src="toast.js?v=20260619"></script>
    <script src="auth.js?v=20260619"></script>
    <script>
        redirectIfAuth();
        async function handleForgot(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const errorEl = document.getElementById('forgot-error');
            const successEl = document.getElementById('forgot-success');
            const btn = document.getElementById('forgot-btn');
            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');
            if (!email) {
                errorEl.textContent = 'Informe seu e-mail.';
                errorEl.classList.remove('hidden'); return;
            }
            btn.disabled = true;
            btn.textContent = 'Enviando...';
            try {
                const res = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                const data = await res.json();
                let msg = data.message || 'Se o email existir, instruções foram enviadas.';
                if (data.reset_url) {
                    msg += ' <span class="demo-reset-link">Modo demonstração: <a href="' + data.reset_url + '" target="_blank">' + data.reset_url + '</a></span>';
                }
                successEl.innerHTML = msg;
                successEl.classList.remove('hidden');
                document.getElementById('email').value = '';
            } catch {
                successEl.textContent = 'Se o email existir, instruções foram enviadas.';
                successEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Enviar';
            }
        }
    </script>
</body>
</html>
