<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha — Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div>
                    <h1>Quiz App</h1>
                    <p>Recupere sua senha</p>
                </div>
                <div class="user-area">
                    <button id="theme-toggle" class="theme-btn" onclick="Theme.toggle()" aria-label="Alternar tema" title="Alternar tema"></button>
                </div>
            </div>
        </header>
        <main>

        <div class="auth-card">
            <h2>Recuperar Senha</h2>

            <div id="forgot-error" class="auth-msg auth-error hidden" role="alert"></div>
            <div id="forgot-success" class="auth-msg auth-success hidden" role="alert"></div>

            <form id="forgot-form" onsubmit="handleForgot(event)">
                <div class="auth-field">
                    <label for="email">E-mail <span class="required-star">*</span></label>
                    <input type="email" id="email" class="auth-input" placeholder="seu@email.com" required autofocus>
                </div>

                <button type="submit" class="submit-btn" id="forgot-btn">Enviar</button>
            </form>

            <p class="auth-link">
                Lembrou sua senha? <a href="/static/login.html">Fazer login</a>
            </p>
        </div>
    </main>
    </div>

    <script src="theme.js"></script>
    <script src="toast.js"></script>
    <script src="auth.js"></script>
    <script>
        redirectIfAuth();

        async function handleForgot(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const errorEl = document.getElementById('forgot-error');
            const successEl = document.getElementById('forgot-success');
            const btn = document.getElementById('forgot-btn');

            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');

            if (!email) {
                errorEl.textContent = 'Informe seu e-mail.';
                errorEl.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Enviando...';

            try {
                const res = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                const data = await res.json();
                successEl.textContent = data.message || 'Se o email existir, instruções foram enviadas.';
                successEl.classList.remove('hidden');
                document.getElementById('email').value = '';
            } catch (err) {
                successEl.textContent = 'Se o email existir, instruções foram enviadas.';
                successEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Enviar';
            }
        }
    </script>
</body>
</html>
