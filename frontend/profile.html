<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil — Quiz App</title>
    <link rel="stylesheet" href="style.css?v=20260619">
</head>
<body>
    <div class="app-layout">
        <div class="main-area">
            <div class="content content-narrow">
        <div id="profile-loading" style="text-align:center;padding:48px">
            <div class="skeleton-circle" style="margin:0 auto 16px;width:80px;height:80px"></div>
            <div class="skeleton" style="height:24px;width:160px;margin:0 auto 8px"></div>
            <div class="skeleton" style="height:14px;width:100px;margin:0 auto"></div>
        </div>
        <div id="profile-error" class="hidden" role="alert"></div>

        <div id="profile-content" class="hidden">
            <div class="profile-header">
                <div class="profile-avatar" id="profile-avatar"></div>
                <div class="profile-info">
                    <h1 id="profile-name"></h1>
                    <p id="profile-role"></p>
                </div>
            </div>

            <div class="profile-stats" id="profile-stats-data">
                <div class="profile-stat-card">
                    <div class="profile-stat-value" id="p-quizzes">0</div>
                    <div class="profile-stat-label">Quizzes criados</div>
                </div>
                <div class="profile-stat-card">
                    <div class="profile-stat-value" id="p-submissions">0</div>
                    <div class="profile-stat-label">Submissões</div>
                </div>
                <div class="profile-stat-card">
                    <div class="profile-stat-value" id="p-avg">0%</div>
                    <div class="profile-stat-label">Média</div>
                </div>
                <div class="profile-stat-card">
                    <div class="profile-stat-value" id="p-best">0%</div>
                    <div class="profile-stat-label">Melhor resultado</div>
                </div>
                <div class="profile-stat-card">
                    <div class="profile-stat-value" id="p-views">0</div>
                    <div class="profile-stat-label">Visualizações</div>
                </div>
            </div>

            <div class="dash-section">
                <div class="dash-section-header">
                    <h3>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        Quizzes criados
                    </h3>
                </div>
                <div id="profile-quizzes" class="dash-empty">Nenhum quiz criado</div>
            </div>

            <div class="dash-section">
                <div class="dash-section-header">
                    <h3>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
                        Conquistas
                    </h3>
                </div>
                <div id="profile-badges"></div>
            </div>
        </div>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <div class="sidebar-overlay" onclick="toggleMobileMenu()"></div>
    <script src="theme.js?v=20260619"></script>
    <script src="toast.js?v=20260619"></script>
    <script src="auth.js?v=20260619"></script>
    <script>
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function getInitials(name) {
            return name.split(' ').map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
        }

        function renderBadges(badges) {
            const el = document.getElementById('profile-badges');
            if (!badges || badges.length === 0) {
                el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎖️</div><h3>Nenhuma conquista ainda</h3><p>Complete quizzes para ganhar conquistas.</p></div>';
                return;
            }
            el.innerHTML = '<div class="badge-grid">' + badges.map(b => `
                <div class="badge-card">
                    <div class="badge-icon">${b.icon}</div>
                    <div class="badge-name">${escapeHtml(b.name)}</div>
                    <div class="badge-desc">${escapeHtml(b.description)}</div>
                </div>
            `).join('') + '</div>';
        }

        function renderProfileQuizzes(quizzes) {
            const el = document.getElementById('profile-quizzes');
            if (!quizzes || quizzes.length === 0) {
                el.className = '';
                el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><h3>Nenhum quiz criado</h3></div>';
                return;
            }
            el.className = 'dash-recent-list';
            el.innerHTML = quizzes.map((q, i) => `
                <div class="dash-recent-item" style="animation-delay:${i*0.05}s">
                    <div class="dash-recent-dot"></div>
                    <div class="dash-recent-body">
                        <span class="dr-title" title="${escapeHtml(q.title)}">${escapeHtml(q.title)}</span>
                        <span class="dr-date">👁️ ${q.views || 0}</span>
                    </div>
                </div>
            `).join('');
        }

        async function loadProfile() {
            const params = new URLSearchParams(window.location.search);
            let userId = params.get('user_id');
            if (!userId) {
                try {
                    const user = await getCurrentUser();
                    if (!user) { throw new Error('Não foi possível carregar seu perfil. Faça login e tente novamente.'); }
                    userId = user.id;
                } catch (err) {
                    document.getElementById('profile-loading').classList.add('hidden');
                    document.getElementById('profile-error').innerHTML = `<div class="alert alert-danger"><span class="alert-message">${handleApiError(err)}</span></div>`;
                    return;
                }
            }
            try {
                const data = await apiGet(`/users/${userId}/profile`);
                document.getElementById('profile-loading').classList.add('hidden');
                document.getElementById('profile-content').classList.remove('hidden');
                document.getElementById('profile-avatar').textContent = getInitials(data.name);
                document.getElementById('profile-name').textContent = escapeHtml(data.name);
                document.getElementById('profile-role').textContent = data.role === 'admin' ? '🛡️ Administrador' : 'Usuário';
                document.getElementById('p-quizzes').textContent = data.quizzes_created;
                document.getElementById('p-submissions').textContent = data.submissions;
                document.getElementById('p-avg').textContent = data.average_score + '%';
                document.getElementById('p-best').textContent = data.best_score + '%';
                document.getElementById('p-views').textContent = data.total_views || 0;
                renderBadges(data.badges);
                renderProfileQuizzes(data.quizzes);
            } catch (err) {
                document.getElementById('profile-loading').classList.add('hidden');
                document.getElementById('profile-error').innerHTML = `<div class="alert alert-danger"><span class="alert-message">${handleApiError(err)}</span></div>`;
                Toast.error(handleApiError(err));
            }
        }

        if (isAuthenticated() && typeof initLayout === 'function') { initLayout('Perfil'); }
        loadProfile();
    </script>
</body>
</html>
