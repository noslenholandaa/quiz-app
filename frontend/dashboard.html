<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Quiz App</title>
    <link rel="stylesheet" href="style.css?v=20260619">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <div class="main-area">
            <div class="content content-wide">
        <div id="dash-loading" style="text-align:center;padding:48px">
            <div class="skeleton" style="height:24px;width:200px;margin:0 auto 12px"></div>
            <div class="skeleton" style="height:14px;width:300px;margin:0 auto"></div>
        </div>
        <div id="dash-error" class="hidden" role="alert"></div>

        <div id="dash-content" class="hidden">
            <div class="dash-grid" id="dash-cards">
                <div class="dash-card"><div class="skeleton" style="height:24px;width:70%;margin:0 auto 12px"></div><div class="skeleton" style="height:32px;width:40%;margin:0 auto"></div></div>
                <div class="dash-card"><div class="skeleton" style="height:24px;width:70%;margin:0 auto 12px"></div><div class="skeleton" style="height:32px;width:40%;margin:0 auto"></div></div>
                <div class="dash-card"><div class="skeleton" style="height:24px;width:70%;margin:0 auto 12px"></div><div class="skeleton" style="height:32px;width:40%;margin:0 auto"></div></div>
                <div class="dash-card"><div class="skeleton" style="height:24px;width:70%;margin:0 auto 12px"></div><div class="skeleton" style="height:32px;width:40%;margin:0 auto"></div></div>
            </div>

            <div class="dash-row">
                <div class="dash-section">
                    <div class="dash-section-header">
                        <h3>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                            Quiz mais visto
                        </h3>
                    </div>
                    <div id="most-viewed-quiz"><div class="empty-state"><div class="empty-state-icon">📊</div><h3>Nenhum quiz criado</h3></div></div>
                </div>

                <div class="dash-chart-card">
                    <div class="dash-chart-header">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
                        Engajamento
                        <span class="badge badge-primary" id="engagement-total" style="margin-left:auto">0</span>
                    </div>
                    <div class="dash-chart-body">
                        <div class="dash-chart-container"><canvas id="chart-engagement"></canvas></div>
                        <div class="chart-legend" id="legend-engagement"></div>
                    </div>
                </div>
            </div>

            <div class="dash-charts-row" style="grid-template-columns:1fr 1fr">
                <div class="dash-chart-card">
                    <div class="dash-chart-header">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                        Atividade por período
                    </div>
                    <div class="dash-chart-body" style="padding:8px 0">
                        <canvas id="chart-periods" style="max-height:200px"></canvas>
                    </div>
                </div>

                <div class="dash-chart-card">
                    <div class="dash-chart-header">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        Estatísticas por período
                    </div>
                    <div class="dash-stats" style="padding:8px 0">
                        <div class="stat-period">
                            <div class="stat-period-title">Últimos 7 dias</div>
                            <div class="stat-row"><span>Submissões</span><strong id="s7-s">0</strong></div>
                            <div class="stat-row"><span>Quizzes</span><strong id="s7-q">0</strong></div>
                        </div>
                        <div class="stat-period">
                            <div class="stat-period-title">Últimos 30 dias</div>
                            <div class="stat-row"><span>Submissões</span><strong id="s30-s">0</strong></div>
                            <div class="stat-row"><span>Quizzes</span><strong id="s30-q">0</strong></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="dash-row">
                <div class="dash-section">
                    <div class="dash-section-header">
                        <h3>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            Últimos quizzes
                        </h3>
                    </div>
                    <div id="recent-quizzes" class="dash-empty">Nenhum quiz criado ainda</div>
                </div>
                <div class="dash-section">
                    <div class="dash-section-header">
                        <h3>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                            Últimas submissões
                        </h3>
                    </div>
                    <div id="recent-submissions" class="dash-empty">Nenhuma submissão ainda</div>
                </div>
            </div>
        </div>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <div class="sidebar-overlay" onclick="toggleMobileMenu()"></div>
    <script src="theme.js?v=20260619"></script>
    <script src="toast.js?v=20260619"></script>
    <script src="auth.js?v=20260619"></script>
    <script>
        let chartEngagement = null;
        let chartPeriods = null;

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function timeAgo(iso) {
            const diff = Date.now() - new Date(iso).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'agora';
            if (mins < 60) return `${mins} min atrás`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return `${hrs} h atrás`;
            const days = Math.floor(hrs / 24);
            if (days === 1) return 'ontem';
            if (days < 30) return `${days} dias atrás`;
            return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        const CARD_CONFIG = [
            { label: 'Quizzes criados', key: 'total_quizzes_created', icon: 'M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z', cls: 'primary' },
            { label: 'Quizzes respondidos', key: 'total_quizzes_responded', icon: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z', cls: 'success' },
            { label: 'Total de submissões', key: 'total_submissions', icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z', cls: 'warning' },
            { label: 'Melhor pontuação', key: 'best_percentage', suffix: '%', icon: 'M12 1a3 3 0 0 0-3 3v3H6a3 3 0 0 0-3 3v8a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3v-8a3 3 0 0 0-3-3h-3V4a3 3 0 0 0-3-3z', cls: 'danger' },
            { label: 'Média geral', key: 'average_percentage', suffix: '%', icon: 'M22 12h-4l-3 9L9 3l-3 9H2', cls: 'primary' },
            { label: 'Posição no ranking', key: 'ranking_position', prefix: '#', icon: 'M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 7 7 7 7m10 2h1.5a2.5 2.5 0 0 0 0-5C17 4 17 7 17 7M4 22h16M10 22V8h4v14', cls: 'success' },
            { label: 'Total de visualizações', key: 'total_views', icon: 'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24', cls: 'warning' },
        ];

        function renderCards(dash) {
            const container = document.getElementById('dash-cards');
            container.innerHTML = CARD_CONFIG.slice(0, 4).map(c => {
                let val = dash[c.key] ?? 0;
                if (c.prefix) val = c.prefix + val;
                if (c.suffix) val = val + c.suffix;
                return `<div class="dash-card">
                    <div class="dash-card-icon ${c.cls}">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${c.icon}"/></svg>
                    </div>
                    <div class="dash-card-value">${val}</div>
                    <div class="dash-card-label">${c.label}</div>
                </div>`;
            }).join('');
        }

        function buildGradient(ctx, c1, c2) {
            const g = ctx.createLinearGradient(0, 0, 0, 300);
            g.addColorStop(0, c1); g.addColorStop(1, c2); return g;
        }

        function isDarkMode() { return document.documentElement.classList.contains('dark'); }
        function chartTextColor() { return isDarkMode() ? '#94a3b8' : '#475569'; }
        function chartTickColor() { return isDarkMode() ? '#475569' : '#94a3b8'; }
        function chartGridColor() { return isDarkMode() ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)'; }

        function renderCharts(dash, stats) {
            if (typeof Chart === 'undefined') return;
            if (chartEngagement) chartEngagement.destroy();
            if (chartPeriods) chartPeriods.destroy();

            document.getElementById('engagement-total').textContent = dash.total_quizzes_created + dash.total_quizzes_responded;

            const engCtx = document.getElementById('chart-engagement').getContext('2d');
            chartEngagement = new Chart(engCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Criados', 'Respondidos'],
                    datasets: [{ data: [dash.total_quizzes_created || 1, dash.total_quizzes_responded || 0], backgroundColor: ['#6366f1', '#10b981'], borderWidth: 0, hoverOffset: 12 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: true, cutout: '75%',
                    plugins: { legend: { display: false }, tooltip: { backgroundColor: isDarkMode() ? '#1e293b' : '#1e293b', padding: 12, cornerRadius: 8 } }
                }
            });

            const legendEl = document.getElementById('legend-engagement');
            const total = dash.total_quizzes_created + dash.total_quizzes_responded;
            legendEl.innerHTML = [
                { label: 'Criados', value: dash.total_quizzes_created, color: '#6366f1' },
                { label: 'Respondidos', value: dash.total_quizzes_responded, color: '#10b981' },
            ].map(l => `<div class="chart-legend-item"><span class="chart-legend-dot" style="background:${l.color}"></span><span class="chart-legend-label">${l.label}</span><span class="chart-legend-value">${l.value}</span></div>`).join('');

            const barCtx = document.getElementById('chart-periods').getContext('2d');
            chartPeriods = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: ['7 dias', '30 dias'],
                    datasets: [
                        { label: 'Submissões', data: [stats.last_7_days.submissions, stats.last_30_days.submissions], backgroundColor: '#6366f1', borderRadius: 6, borderSkipped: false, barPercentage: 0.4 },
                        { label: 'Quizzes', data: [stats.last_7_days.quizzes_created, stats.last_30_days.quizzes_created], backgroundColor: '#10b981', borderRadius: 6, borderSkipped: false, barPercentage: 0.4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: true,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 14, boxHeight: 14, borderRadius: 4, padding: 16, font: { size: 12 }, color: chartTextColor() } }, tooltip: { backgroundColor: '#1e293b', padding: 12, cornerRadius: 8 } },
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 }, color: chartTickColor() }, grid: { color: chartGridColor(), drawBorder: false } },
                        x: { grid: { display: false }, ticks: { font: { size: 12, weight: '700' }, color: chartTextColor() } }
                    }
                }
            });

            document.getElementById('s7-s').textContent = stats.last_7_days.submissions;
            document.getElementById('s7-q').textContent = stats.last_7_days.quizzes_created;
            document.getElementById('s30-s').textContent = stats.last_30_days.submissions;
            document.getElementById('s30-q').textContent = stats.last_30_days.quizzes_created;
        }

        function renderList(containerId, items, emptyText, titleField, dateField) {
            const el = document.getElementById(containerId);
            if (!items || items.length === 0) { el.className = ''; el.innerHTML = `<div class="dash-empty">${emptyText}</div>`; return; }
            el.className = 'dash-recent-list';
            el.innerHTML = items.map((item, i) => `<div class="dash-recent-item" style="animation-delay:${i*0.05}s"><div class="dash-recent-dot"></div><div class="dash-recent-body"><span class="dr-title" title="${escapeHtml(item[titleField])}">${escapeHtml(item[titleField])}</span><span class="dr-date">${timeAgo(item[dateField])}</span></div></div>`).join('');
        }

        async function loadDashboard() {
            try {
                const [dash, stats] = await Promise.all([apiGet('/me/dashboard'), apiGet('/me/stats')]);
                document.getElementById('dash-loading').classList.add('hidden');
                document.getElementById('dash-content').classList.remove('hidden');
                renderCards(dash);
                setTimeout(() => renderCharts(dash, stats), 150);
                renderList('recent-quizzes', dash.recent_quizzes, 'Nenhum quiz criado ainda', 'title', 'created_at');
                renderList('recent-submissions', dash.recent_submissions, 'Nenhuma submissão ainda', 'quiz_title', 'created_at');
            } catch (err) {
                document.getElementById('dash-loading').classList.add('hidden');
                document.getElementById('dash-error').classList.remove('hidden');
                document.getElementById('dash-error').innerHTML = `<div class="alert alert-danger"><span class="alert-message">${handleApiError(err)}</span></div>`;
                Toast.error(handleApiError(err));
            }
        }

        redirectIfNotAuth();
        if (typeof initLayout === 'function') initLayout('Dashboard');
        loadDashboard();
    </script>
</body>
</html>
