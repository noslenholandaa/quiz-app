<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking — Quiz App</title>
    <link rel="stylesheet" href="style.css?v=20260619">
</head>
<body>
    <div class="app-layout">
        <div class="main-area">
            <div class="content content-narrow">
        <div id="lb-loading" style="text-align:center;padding:32px">
            <div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:10px"></div>
            <div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:10px"></div>
            <div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:10px"></div>
            <div class="skeleton" style="height:60px;border-radius:10px"></div>
        </div>
        <div id="lb-error" class="hidden" role="alert"></div>

        <div id="lb-content" class="hidden">
            <div id="lb-list" class="lb-list"></div>
            <div id="lb-pagination" class="lb-pagination"></div>
        </div>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <div class="sidebar-overlay" onclick="toggleMobileMenu()"></div>
    <script src="theme.js?v=20260619"></script>
    <script src="toast.js?v=20260619"></script>
    <script src="auth.js?v=20260619"></script>
    <script>
        let currentPage = 1;
        const PAGE_SIZE = 20;

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function getInitials(name) {
            return name.split(' ').map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
        }

        function renderLeaderboard(entries) {
            const el = document.getElementById('lb-list');
            if (!entries || entries.length === 0) {
                el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏆</div><h3>Nenhum dado ainda</h3><p>Quando houver submissões, o ranking será exibido aqui.</p></div>';
                return;
            }
            el.innerHTML = entries.map((e, i) => {
                const pos = (currentPage - 1) * PAGE_SIZE + i + 1;
                const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : '';
                const topClass = pos === 1 ? 'top-1' : pos === 2 ? 'top-2' : pos === 3 ? 'top-3' : '';
                return `<div class="lb-entry ${topClass}">
                    <div class="lb-pos">${medal || `#${pos}`}</div>
                    <div class="lb-avatar">${getInitials(e.name)}</div>
                    <div class="lb-info">
                        <a href="/static/profile.html?user_id=${e.user_id}" class="lb-name">${escapeHtml(e.name)}</a>
                    </div>
                    <div class="lb-stats">
                        <div class="lb-stat"><span class="lb-stat-value">${e.total_score}</span><span class="lb-stat-label">pontos</span></div>
                        <div class="lb-stat"><span class="lb-stat-value">${e.submissions}</span><span class="lb-stat-label">subm.</span></div>
                        <div class="lb-stat"><span class="lb-stat-value">${e.average_percentage}%</span><span class="lb-stat-label">média</span></div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderPagination(entries) {
            const el = document.getElementById('lb-pagination');
            if (entries.length < PAGE_SIZE && currentPage === 1) { el.innerHTML = ''; return; }
            el.innerHTML = `<button class="btn btn-secondary btn-sm" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>Anterior</button>
                <span class="lb-page-info">Página ${currentPage}</span>
                <button class="btn btn-secondary btn-sm" onclick="goPage(${currentPage + 1})" ${entries.length < PAGE_SIZE ? 'disabled' : ''}>Próxima</button>`;
        }

        async function goPage(page) {
            if (page < 1) return;
            currentPage = page;
            document.getElementById('lb-loading').classList.remove('hidden');
            document.getElementById('lb-content').classList.add('hidden');
            try {
                const data = await apiGet(`/leaderboard?page=${page}&limit=${PAGE_SIZE}`);
                renderLeaderboard(data);
                renderPagination(data);
                document.getElementById('lb-loading').classList.add('hidden');
                document.getElementById('lb-content').classList.remove('hidden');
            } catch (err) {
                document.getElementById('lb-loading').classList.add('hidden');
                document.getElementById('lb-error').innerHTML = `<div class="alert alert-danger mt-4"><span class="alert-message">${handleApiError(err)}</span></div>`;
            }
        }

        async function loadLeaderboard() {
            try {
                const data = await apiGet(`/leaderboard?page=1&limit=${PAGE_SIZE}`);
                renderLeaderboard(data);
                renderPagination(data);
                document.getElementById('lb-loading').classList.add('hidden');
                document.getElementById('lb-content').classList.remove('hidden');
            } catch (err) {
                document.getElementById('lb-loading').classList.add('hidden');
                document.getElementById('lb-error').innerHTML = `<div class="alert alert-danger mt-4"><span class="alert-message">${handleApiError(err)}</span></div>`;
            }
        }

        redirectIfNotAuth();
        if (typeof initLayout === 'function') initLayout('Ranking');
        loadLeaderboard();
    </script>
</body>
</html>
