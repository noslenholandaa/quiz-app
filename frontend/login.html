<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar — Quiz App</title>
    <link rel="stylesheet" href="style.css?v=20260619">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">QA</div>
            <h1>Quiz App</h1>
            <p>Faça login para acessar os formulários</p>
        </div>
        <div class="auth-card">
            <h2>Entrar</h2>
            <div id="login-error" class="auth-msg auth-error hidden" role="alert"></div>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="email">E-mail</label>
                    <input type="email" id="email" class="form-input" placeholder="seu@email.com" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <input type="password" id="password" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">Entrar</button>
            </form>
            <div class="auth-footer">
                Não tem conta? <a href="/static/register.html">Criar conta</a>
            </div>
            <div class="auth-footer">
                <a href="/static/forgot-password.html">Esqueci minha senha</a>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="theme.js?v=20260619"></script>
    <script src="toast.js?v=20260619"></script>
    <script src="auth.js?v=20260619"></script>
    <script>
        redirectIfAuth();
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');
            errorEl.classList.add('hidden');
            if (!email || !password) {
                errorEl.textContent = 'Preencha todos os campos obrigatórios.';
                errorEl.classList.remove('hidden');
                return;
            }
            btn.disabled = true;
            btn.textContent = 'Entrando...';
            try {
                await loginUser(email, password);
                window.location.href = '/static/index.html';
            } catch (err) {
                errorEl.textContent = handleApiError(err);
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Entrar';
                Toast.error(handleApiError(err));
            }
        }
    </script>
</body>
</html>
