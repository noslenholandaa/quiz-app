<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div>
                    <h1>Painel Admin</h1>
                    <p>Gerenciamento do sistema</p>
                </div>
                <div id="user-area" class="user-area hidden">
                    <span id="user-name" class="user-name"></span>
                    <button id="theme-toggle" class="theme-btn" onclick="Theme.toggle()" aria-label="Alternar tema" title="Alternar tema"></button>
                    <span class="admin-badge-static">Admin</span>
                    <button class="logout-btn" onclick="logout()">Sair</button>
                </div>
            </div>
        </header>
        <main>

        <nav class="nav-bar" aria-label="Navegação">
            <a href="/static/dashboard.html" class="nav-link">&larr; Dashboard</a>
        </nav>

        <div id="admin-loading" class="loading">
            <div class="spinner"></div>Carregando painel...
            <div style="margin-top:1rem;max-width:500px;margin-left:auto;margin-right:auto">
                <div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:10px"></div>
                <div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:10px"></div>
                <div class="skeleton" style="height:60px;border-radius:10px"></div>
            </div>
        </div>
        <div id="admin-error" class="error hidden" role="alert"></div>

        <div id="admin-content" class="hidden">
            <div class="admin-stats-row">
                <div class="admin-stat-card">
                    <div class="admin-stat-value" id="stat-users">0</div>
                    <div class="admin-stat-label">Usuários</div>
                </div>
                <div class="admin-stat-card">
                    <div class="admin-stat-value" id="stat-quizzes">0</div>
                    <div class="admin-stat-label">Quizzes</div>
                </div>
                <div class="admin-stat-card">
                    <div class="admin-stat-value" id="stat-submissions">0</div>
                    <div class="admin-stat-label">Submissões</div>
                </div>
            </div>

            <div class="dash-section">
                <div class="dash-section-header">
                    <h3>Usuários cadastrados</h3>
                </div>
                <div id="admin-users-list"></div>
            </div>
        </div>
    </main>
    </div>

    <script src="theme.js"></script>
    <script src="toast.js"></script>
    <script src="auth.js"></script>
    <script>
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function renderUsers(users) {
            const el = document.getElementById('admin-users-list');
            if (!users || users.length === 0) {
                el.innerHTML = '<div class="empty-state"><div class="empty-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><h3>Nenhum usuário</h3><p>Nenhum usuário encontrado com esse filtro.</p></div>';
                return;
            }
            el.innerHTML = `
                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Nome</th>
                                <th scope="col">Email</th>
                                <th scope="col">Role</th>
                                <th scope="col">Quizzes</th>
                                <th scope="col">Submissões</th>
                                <th scope="col">Criado em</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${users.map(u => {
                                const date = new Date(u.created_at).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
                                const isAdmin = u.role === 'admin';
                                return `
                                    <tr${isAdmin ? ' class="admin-row"' : ''}>
                                        <td>${u.id}</td>
                                        <td><strong>${escapeHtml(u.name)}</strong></td>
                                        <td>${escapeHtml(u.email)}</td>
                                        <td><span class="role-badge role-${u.role}">${isAdmin ? '🛡️ Admin' : 'Usuário'}</span></td>
                                        <td>${u.quizzes_count}</td>
                                        <td>${u.submissions_count}</td>
                                        <td class="admin-date">${date}</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function loadAdmin() {
            try {
                const data = await apiGet('/admin/dashboard');
                document.getElementById('admin-loading').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');

                document.getElementById('stat-users').textContent = data.total_users;
                document.getElementById('stat-quizzes').textContent = data.total_quizzes;
                document.getElementById('stat-submissions').textContent = data.total_submissions;

                renderUsers(data.users);
            } catch (err) {
                document.getElementById('admin-loading').classList.add('hidden');
                document.getElementById('admin-error').textContent = handleApiError(err);
                document.getElementById('admin-error').classList.remove('hidden');
                Toast.error(handleApiError(err));
            }
        }

        async function loadUser() {
            try {
                const user = await fetchMe();
                document.getElementById('user-name').textContent = user.name;
                document.getElementById('user-area').classList.remove('hidden');
                if (user.role !== 'admin') {
                    document.getElementById('admin-loading').classList.add('hidden');
                    document.getElementById('admin-error').textContent = 'Acesso restrito a administradores.';
                    document.getElementById('admin-error').classList.remove('hidden');
                    return;
                }
                loadAdmin();
            } catch (err) {
                if (err.status === 401) { logout(); }
                else { Toast.error(handleApiError(err)); logout(); }
            }
        }

        redirectIfNotAuth();
        loadUser();
    </script>
</body>
</html>
