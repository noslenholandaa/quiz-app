<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico — Quiz App</title>
    <link rel="stylesheet" href="style.css?v=20260619">
</head>
<body>
    <div class="app-layout">
        <div class="main-area">
            <div class="content content-narrow">
        <div id="history-loading" style="text-align:center;padding:32px">
            <div class="skeleton" style="height:120px;margin-bottom:12px;border-radius:12px"></div>
            <div class="skeleton" style="height:120px;margin-bottom:12px;border-radius:12px"></div>
            <div class="skeleton" style="height:120px;border-radius:12px"></div>
        </div>
        <div id="history-error" class="hidden" role="alert"></div>

        <div id="history-empty" class="hidden">
            <div class="empty-state">
                <div class="empty-state-icon">📜</div>
                <h3>Nenhum quiz respondido ainda</h3>
                <p>Complete seu primeiro quiz para ver seu desempenho aqui.</p>
                <a href="/static/index.html" class="btn btn-primary" style="margin-top:8px">Explorar quizzes</a>
            </div>
        </div>

        <div id="history-list" class="hidden"></div>
        <div id="history-pagination" class="grid-pagination" style="margin-top:16px"></div>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <div class="sidebar-overlay" onclick="toggleMobileMenu()"></div>
    <script src="theme.js?v=20260619"></script>
    <script src="toast.js?v=20260619"></script>
    <script src="auth.js?v=20260619"></script>
    <style>
        #debug-toggle { position:fixed; bottom:8px; right:8px; z-index:9999; font-size:10px; padding:3px 8px; border-radius:4px; border:1px solid var(--border); background:var(--surface-card); color:var(--text-muted); cursor:pointer; opacity:0.5; }
        #debug-toggle:hover { opacity:1; }
        #debug-panel { display:none; position:fixed; bottom:36px; right:8px; z-index:9999; max-width:90vw; max-height:60vh; overflow:auto; font-size:11px; font-family:monospace; background:var(--surface-card); border:1px solid var(--border); border-radius:8px; padding:12px; color:var(--text-primary); white-space:pre-wrap; word-break:break-all; line-height:1.5; }
        #debug-panel.open { display:block; }
    </style>
    <button id="debug-toggle" onclick="const p=document.getElementById('debug-panel');p.classList.toggle('open');this.textContent=p.classList.contains('open')?'✕ Fechar Debug':'🐛 Debug'">🐛 Debug</button>
    <pre id="debug-panel"></pre>
    <script>
        function setDebug(data) {
            const el = document.getElementById('debug-panel');
            if (el) el.textContent = JSON.stringify(data, null, 2);
        }
        let currentPage = 1;
        const PAGE_SIZE = 15;

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function renderSubmissionCard(s) {
            console.debug('[History] Rendering submission', s.id, 'answers:', JSON.parse(JSON.stringify(s.answers)));
            const correctCount = s.answers.filter(a => a.correct).length;
            const incorrectCount = s.answers.length - correctCount;
            const perc = s.percentage || Math.round((s.score / s.max_score) * 100) || 0;
            const badge = getGradeLabel(perc);

            const answersHtml = s.answers.map((a, idx) => {
                const isCorrect = a.correct === true;
                if (typeof a.correct !== 'boolean') {
                    console.warn('[History] Answer', idx, 'correct is not boolean:', typeof a.correct, a.correct);
                }
                const icon = isCorrect
                    ? '<span class="h-answer-icon h-correct" title="Correta">&#10003;</span>'
                    : '<span class="h-answer-icon h-incorrect" title="Incorreta">&#10007;</span>';
                const rowClass = isCorrect ? 'h-answer-correct' : 'h-answer-incorrect';
                const rawAnswer = a.answer;
                const displayAnswer = a.answer_text || String(rawAnswer);
                console.debug('[History] Answer', idx, 'correct=', isCorrect, 'raw=', rawAnswer, 'display=', displayAnswer);
                return `<div class="h-answer-row ${rowClass}">
                    <div class="h-answer-content">
                        <div class="h-answer-question">${escapeHtml(a.question_text)}</div>
                        <div class="h-answer-value">${escapeHtml(displayAnswer)}</div>
                    </div>
                    ${icon}
                </div>`;
            }).join('');

            return `<div class="h-card">
                <div class="h-card-header">
                    <div class="h-card-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                        ${escapeHtml(s.quiz_title)}
                    </div>
                    <span class="badge ${getGradeClass(perc)}">${perc}%</span>
                </div>
                <div class="h-card-summary">
                    <div class="h-summary-item h-summary-correct">
                        <span class="h-summary-icon">&#10003;</span>
                        <span><strong>${correctCount}</strong> corretas</span>
                    </div>
                    <div class="h-summary-item h-summary-incorrect">
                        <span class="h-summary-icon">&#10007;</span>
                        <span><strong>${incorrectCount}</strong> incorretas</span>
                    </div>
                    <div class="h-summary-item h-summary-total">
                        <span class="h-summary-icon">&#9733;</span>
                        <span><strong>${perc}%</strong> de aproveitamento</span>
                    </div>
                    <span class="h-badge-performance">${badge.icon} ${badge.label}</span>
                </div>
                <div class="h-card-answers">${answersHtml}</div>
                <div class="h-card-footer">
                    <span class="h-card-date">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        ${formatDate(s.created_at)}
                    </span>
                </div>
            </div>`;
        }

        function renderHistory(items) {
            const el = document.getElementById('history-list');
            if (!items || items.length === 0) {
                el.classList.add('hidden');
                document.getElementById('history-empty').classList.remove('hidden');
                return;
            }
            document.getElementById('history-empty').classList.add('hidden');
            el.innerHTML = items.map(renderSubmissionCard).join('');
            el.classList.remove('hidden');
        }

        function renderHistoryPagination(totalCount) {
            const totalPages = Math.ceil(totalCount / PAGE_SIZE) || 1;
            const el = document.getElementById('history-pagination');
            if (totalPages <= 1) { el.innerHTML = ''; return; }
            el.innerHTML = `<button class="btn btn-secondary btn-sm" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>Anterior</button>
                <span class="page-info">${currentPage} / ${totalPages}</span>
                <button class="btn btn-secondary btn-sm" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>Próxima</button>`;
        }

        async function goPage(page) {
            if (page < 1) return;
            currentPage = page;
            document.getElementById('history-loading').classList.remove('hidden');
            document.getElementById('history-list').classList.add('hidden');
            document.getElementById('history-error').classList.add('hidden');
            try {
                const data = await apiGet(`/me/submissions?page=${page}&limit=${PAGE_SIZE}&_=${Date.now()}`);
                renderHistory(data.items);
                renderHistoryPagination(data.total);
                document.getElementById('history-loading').classList.add('hidden');
                document.getElementById('history-list').classList.remove('hidden');
            } catch (err) {
                document.getElementById('history-loading').classList.add('hidden');
                document.getElementById('history-error').innerHTML =
                    `<div class="alert alert-danger"><span class="alert-message">${handleApiError(err)}</span></div>
                     <div style="text-align:center;margin-top:12px">
                       <button class="btn btn-secondary" onclick="forceReload()">Tentar novamente</button>
                     </div>`;
            }
        }

        function forceReload() {
            document.getElementById('history-empty').classList.add('hidden');
            document.getElementById('history-error').classList.add('hidden');
            document.getElementById('history-loading').classList.remove('hidden');
            currentPage = 1;
            loadHistory();
        }

        async function loadHistory() {
            try {
                const data = await apiGet(`/me/submissions?page=${currentPage}&limit=${PAGE_SIZE}&_=${Date.now()}`);

                setDebug(data);
                console.debug('[History] Raw API response:', JSON.parse(JSON.stringify(data)));
                if (!data || typeof data.total === 'undefined') {
                    throw new Error('Resposta inválida do servidor');
                }

                if (data.items && data.items.length > 0) {
                    const first = data.items[0];
                    console.debug('[History] First submission answers:',
                        JSON.parse(JSON.stringify(first.answers)));
                    first.answers.forEach((a, i) => {
                        console.debug(`[History] Answer ${i}: typeof correct = ${typeof a.correct}, value =`, a.correct);
                    });
                }

                renderHistory(data.items);
                renderHistoryPagination(data.total);
                document.getElementById('history-loading').classList.add('hidden');
            } catch (err) {
                document.getElementById('history-loading').classList.add('hidden');
                document.getElementById('history-error').innerHTML =
                    `<div class="alert alert-danger"><span class="alert-message">${handleApiError(err)}</span></div>
                     <div style="text-align:center;margin-top:12px">
                       <button class="btn btn-secondary" onclick="forceReload()">Tentar novamente</button>
                     </div>`;
            }
        }

        redirectIfNotAuth();
        if (typeof initLayout === 'function') initLayout('Histórico');
        loadHistory();
    </script>
</body>
</html>
