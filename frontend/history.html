<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico — Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div>
                    <h1>Quiz App</h1>
                    <p>Seu histórico de formulários respondidos</p>
                </div>
                <div id="user-area" class="user-area hidden">
                    <span id="user-name" class="user-name"></span>
                    <button id="theme-toggle" class="theme-btn" onclick="Theme.toggle()" aria-label="Alternar tema" title="Alternar tema"></button>
                    <a href="/static/dashboard.html" class="history-link">Dashboard</a>
                    <button class="logout-btn" onclick="logout()">Sair</button>
                </div>
            </div>
        </header>
        <main>

        <nav class="nav-bar" aria-label="Navegação">
            <a href="/static/index.html" class="nav-link">&larr; Voltar</a>
        </nav>

        <div id="history-loading" class="loading">
            <div class="spinner"></div>Carregando histórico...
            <div style="margin-top:1rem;max-width:500px;margin-left:auto;margin-right:auto">
                <div class="skeleton" style="height:20px;width:60%;margin:0 auto 20px"></div>
                <div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:10px"></div>
                <div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:10px"></div>
                <div class="skeleton" style="height:60px;border-radius:10px"></div>
            </div>
        </div>

        <div id="history-empty" class="empty-state hidden">
            <div class="empty-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
            </div>
            <h3>Nenhum resultado ainda</h3>
            <p>Após responder quizzes, suas submissões aparecerão aqui.</p>
            <a href="/static/index.html" class="dash-empty-cta">Responder quizzes</a>
        </div>

        <div id="history-error" class="error hidden" role="alert"></div>

        <div id="history-list" class="history-list hidden"></div>
    </main>
    </div>

    <div id="detail-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" onclick="closeDetail(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeDetail()">&times;</button>
            <div id="detail-body"></div>
        </div>
    </div>

    <script src="theme.js"></script>
    <script src="toast.js"></script>
    <script src="auth.js"></script>
    <script>
        let submissions = [];

        function formatDate(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('pt-BR', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function renderHistory(list) {
            const container = document.getElementById('history-list');
            container.innerHTML = list.map((s, idx) => `
                <div class="history-card" onclick="showDetail(${idx})">
                    <div class="hc-top">
                        <span class="hc-title">${escapeHtml(s.quiz_title)}</span>
                        <span class="hc-id">#${s.id}</span>
                    </div>
                    <div class="hc-meta">
                        <span class="hc-date">${formatDate(s.created_at)}</span>
                        <span class="hc-sep">•</span>
                        <span class="hc-answers">${s.answers.length} ${s.answers.length === 1 ? 'resposta' : 'respostas'}</span>

                    </div>
                </div>
            `).join('');
            container.classList.remove('hidden');
        }

        function showDetail(idx) {
            const s = submissions[idx];
            const body = document.getElementById('detail-body');
            body.innerHTML = `
                <div class="detail-header">
                    <h2>${escapeHtml(s.quiz_title)}</h2>
                    <div class="detail-meta">
                        Protocolo #${s.id} • ${formatDate(s.created_at)} • ${s.answers.length} ${s.answers.length === 1 ? 'resposta' : 'respostas'}
                    </div>
                </div>
                <div class="detail-answers">
                    ${s.answers.map(a => `
                        <div class="detail-answer">
                            <div class="da-question">${escapeHtml(a.question_text)}</div>
                            <div class="da-answer">${formatAnswer(a.answer)}</div>
            `;
                            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeDetail(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('detail-modal').classList.add('hidden');
        }

        function formatAnswer(answer) {
            if (Array.isArray(answer)) return answer.join(', ');
            return String(answer);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadHistory() {
            try {
                submissions = await apiGet('/me/submissions');
                document.getElementById('history-loading').classList.add('hidden');

                if (submissions.length === 0) {
                    document.getElementById('history-empty').classList.remove('hidden');
                    return;
                }

                renderHistory(submissions);
            } catch (err) {
                document.getElementById('history-loading').classList.add('hidden');
                const errEl = document.getElementById('history-error');
                errEl.textContent = handleApiError(err);
                errEl.classList.remove('hidden');
                Toast.error(handleApiError(err));
            }
        }

        async function loadUser() {
            try {
                const user = await fetchMe();
                document.getElementById('user-name').textContent = user.name;
                document.getElementById('user-area').classList.remove('hidden');
            } catch (err) {
                if (err.status === 401) { logout(); }
                else { Toast.error(handleApiError(err)); logout(); }
            }
        }

        redirectIfNotAuth();
        loadUser();
        loadHistory();
    </script>
</body>
</html>
